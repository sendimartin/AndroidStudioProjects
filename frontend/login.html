<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - E-Commerce</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    overflow: hidden;
}
.card {
    background: rgba(255,255,255,0.95);
    padding: 2rem 2.5rem;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 2;
}
h2 {
    text-align: center;
    margin-bottom: 2rem;
    color: #ff6f61;
}
input, select, button {
    border-radius: 50px;
    padding: 0.75rem 1rem;
    font-size: 1rem;
}
button {
    background: #ff6f61;
    border: none;
    color: #fff;
    transition: 0.3s;
}
button:hover {
    background: #ff3b2e;
}
p { text-align: center; margin-top: 1rem; font-weight: 500; }
p a { color: #ff6f61; text-decoration: none; font-weight: 600; }
.particles {
    position: absolute;
    width: 100%;
    height: 100%;
    top:0; left:0;
    overflow: hidden;
    z-index:1;
}
.particles div {
    position: absolute;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    animation: float 10s linear infinite;
}
@keyframes float {
    0% { transform: translateY(0) rotate(0deg);}
    100% { transform: translateY(-120vh) rotate(360deg);}
}
</style>
</head>
<body>

<div class="particles">
    <div style="width:20px;height:20px;left:10%;animation-duration:12s;"></div>
    <div style="width:15px;height:15px;left:30%;animation-duration:8s;"></div>
    <div style="width:25px;height:25px;left:50%;animation-duration:10s;"></div>
    <div style="width:18px;height:18px;left:70%;animation-duration:14s;"></div>
    <div style="width:12px;height:12px;left:90%;animation-duration:11s;"></div>
</div>

<div class="card">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="email" class="form-control mb-3" name="email" placeholder="Email" required>
        <input type="password" class="form-control mb-3" name="password" placeholder="Password" required>
        <button class="btn w-100">Login</button>
    </form>
    <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script src="login.js"></script>
</body>
</html>
